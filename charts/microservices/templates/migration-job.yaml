{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "microservice.fullname" . }}-migration
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
  annotations:
    # 🟢 ArgoCD will run this before updating the Rollout
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0 # Fail fast so Argo stops the rollout immediately
  template:
    metadata:
      labels:
        {{- include "microservice.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrator
          # 🟢 Uses the exact same image and tag as the incoming Rollout
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app 
          command: ["/bin/sh", "-c"]
          args: 
            - |
              echo "🚀 Starting database migration job..."
              echo "📊 Current Database Status:"
              /app/node_modules/.bin/dbmate -d /app/src/db/migrations status
              echo "⏳ Applying new migrations (if any)..."
              /app/node_modules/.bin/dbmate -d /app/src/db/migrations --no-dump-schema up
              echo "✅ Migration process finished!"
          
          # 🟢 Wires directly into the SOPS secret generated by the chart
          env:
            - name: DBMATE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "microservice.fullname" . }}-secret
                  key: DBMATE_DATABASE_URL
{{- end }}