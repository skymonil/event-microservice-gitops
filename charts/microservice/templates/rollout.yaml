## charts/microservice/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}

  strategy:
    blueGreen:
      activeService: {{ include "microservice.fullname" . }}
      previewService: {{ include "microservice.fullname" . }}-preview
      autoPromotionEnabled: true

      prePromotionAnalysis:
        templates:
          - templateName: http-golden-signals
            clusterScope: true
          - templateName: synthetic-test-runner
            clusterScope: true
        args:
          - name: service-name
            value: {{ include "microservice.fullname" . }}
          - name: target-url
            value: http://{{ include "microservice.fullname" . }}-preview:{{ .Values.service.port }}
          - name: test-cmd
            value: {{ .Values.analysis.testCmd | default "test:smoke" | quote }}

  template:
    metadata:
      labels:
        {{- include "microservice.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.config }}
        checksum/config: {{ toYaml .Values.config | sha256sum }}
        {{- end }}
        {{- if .Values.secrets }}
        checksum/secret: {{ toYaml .Values.secrets | sha256sum }}
        {{- end }}

    spec:
      automountServiceAccountToken: {{ if .Values.podSecurity }}{{ .Values.podSecurity.automountServiceAccountToken | default false }}{{ else }}false{{ end }}

      {{- if and .Values.podSecurity .Values.podSecurity.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurity.podSecurityContext | nindent 8 }}
      {{- end }}

      containers:
        - name: application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          {{- if and .Values.podSecurity .Values.podSecurity.containerSecurityContext }}
          securityContext:
            {{- toYaml .Values.podSecurity.containerSecurityContext | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          {{- if or .Values.config .Values.secrets }}
          envFrom:
            {{- if .Values.config }}
            - configMapRef:
                name: {{ include "microservice.fullname" . }}-config
            {{- end }}
            {{- if .Values.secrets }}
            - secretRef:
                name: {{ include "microservice.fullname" . }}-secret
            {{- end }}
          {{- end }}

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          {{- if .Values.probes }}
          {{- with .Values.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}