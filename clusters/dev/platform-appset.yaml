apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-platform-infrastructure
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: cluster-addons
            path: cluster-addons
            syncWave: "-3"
          # 🟢 Split name (safe for k8s) and path (points to directory)
          - name: gateway-k3s
            path: gateway/overlays/k3s
            syncWave: "-2"
          - name: state-postgres
            path: state/postgres
            syncWave: "-1"
          - name: state-redis
            path: state/redis
            syncWave: "-1"
          - name: state-kafka-operator
            path: state/kafka/operator
            syncWave: "-1"
          
          - name: state-kafka
            path: state/kafka/cluster
            syncWave: "0"
          - name: observability
            path: observability
            syncWave: "0"
  template:
    metadata:
      # 🟢 Uses the safe alphanumeric token for the resource name
      name: 'dev-platform-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        targetRevision: HEAD
        # 🟢 Points to the functional path location
        path: 'platform/{{path}}'

        kustomize:
          buildOptions: "--enable-helm"

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true