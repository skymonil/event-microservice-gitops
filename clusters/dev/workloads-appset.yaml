apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-microservice-workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  generators:
    - git:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        revision: HEAD
        directories:
          - path: workloads/dev/*
  template:
    metadata:
      name: 'dev-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      sources:
        # Source 1: The Core Helm Chart Compiler Engine
        - repoURL: https://github.com/skymonil/event-microservice-gitops.git
          targetRevision: HEAD
          path: charts/microservice # 🟢 Points straight to your native Chart.yaml folder
          helm:
            valueFiles:
              # Pulls public properties and your decrypted keys list dynamically
              - $values/{{path}}/values.yaml
              - secrets://.$values/{{path}}/secrets.enc.yaml
          
        # Source 2: The Absolute Value Context File Provider
        - repoURL: https://github.com/skymonil/event-microservice-gitops.git
          targetRevision: HEAD
          ref: values # 🟢 Ties back to the $values prefix variable defined above
              
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true