apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-microservice-workloads
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        revision: HEAD
        directories:
          - path: workloads/dev/*

  template:
    metadata:
      name: dev-{{path.basename}}

    spec:
      project: default

      source:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        targetRevision: HEAD
        path: '{{path}}'

        helm:
          dependencyUpdate: true

          valueFiles:
            - values.yaml
            - secrets://secrets.enc.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true