apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-microservice-workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  generators:
    - git:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        revision: HEAD
        directories:
          - path: workloads/dev/*
  template:
    metadata:
      name: 'dev-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      
      # 🟢 FIX: Switch from 'source' to 'sources' to use the multi-source engine
      sources:
        # Source 1: Points directly to your template engine folder
        - repoURL: https://github.com/skymonil/event-microservice-gitops.git
          targetRevision: HEAD
          path: charts/microservice # This folder contains your real Chart.yaml
          helm:
            valueFiles:
              # $values points to the root of Source 2 defined below
              - $values/{{path}}/values.yaml
              - $values/{{path}}/secrets.enc.yaml

        # Source 2: Points to the root of your repo to act as the values provider
        - repoURL: https://github.com/skymonil/event-microservice-gitops.git
          targetRevision: HEAD
          ref: values # This matches the $values variable prefix used above

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true