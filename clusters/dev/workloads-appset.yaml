apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-microservice-workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  generators:
    - git:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        revision: HEAD
        # Scans directories exactly one level deep to find individual services
        directories:
          - path: workloads/dev/*
  template:
    metadata:
      name: 'dev-{{path.basename}}'
      annotations:
        # Ensures workloads are only deployed after platform infra (sync-waves < 0) is fully healthy
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      source:
        repoURL: https://github.com/skymonil/event-microservice-gitops.git
        targetRevision: HEAD
        # Points EVERY discovered application to your single generic Helm chart
        path: charts/microservice
        helm:
          # Automatically feeds the specific app's values file into the generic chart templates
          valueFiles:
            - '/{{path}}/values.yaml'
      destination:
        server: https://kubernetes.default.svc
        # Dynamically isolates each service into its own dedicated namespace
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true