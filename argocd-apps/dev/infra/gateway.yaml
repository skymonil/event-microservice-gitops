apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-gateway
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/skymonil/event-microservice-gitops
    targetRevision: main
    path: environments/dev/infra/gateway/overlays/k3s

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true