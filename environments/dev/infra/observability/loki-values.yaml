deploymentMode: SingleBinary

loki:

  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  storage_config:

    filesystem:
      directory: /tmp/loki/chunks

    boltdb_shipper:
      active_index_directory: /tmp/loki/index
      cache_location: /tmp/loki/cache

  schemaConfig:

    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v13

        index:
          prefix: loki_index_
          period: 24h

  ruler:
    enable_api: false

singleBinary:

  replicas: 1

  persistence:
    enabled: false

gateway:
  enabled: false

monitoring:

  dashboards:
    enabled: false

  rules:
    enabled: false

  serviceMonitor:
    enabled: false

  selfMonitoring:
    enabled: false

    grafanaAgent:
      installOperator: false

test:
  enabled: false

lokiCanary:
  enabled: false


# disable distributed mode components

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0