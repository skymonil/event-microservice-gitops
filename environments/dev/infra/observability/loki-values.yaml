deploymentMode: SingleBinary

loki:

  auth_enabled: false

  commonConfig:
    replication_factor: 1

  ########################################
  # storage (local filesystem)
  ########################################

  storage:
    type: filesystem

  storage_config:

    filesystem:
      directory: /tmp/loki/chunks

    boltdb_shipper:
      active_index_directory: /tmp/loki/index
      cache_location: /tmp/loki/cache

  ########################################
  # schema
  ########################################

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v13

        index:
          prefix: loki_index_
          period: 24h

  ########################################
  # disable ruler (fix readonly fs error)
  ########################################

  ruler:
    enabled: false

  ########################################
  # disable compactor persistence
  ########################################

  compactor:
    working_directory: /tmp/loki/compactor

  ########################################
  # server config
  ########################################

  server:
    http_listen_port: 3100


########################################
# single binary mode
########################################

singleBinary:

  replicas: 1

  persistence:
    enabled: false

########################################
# disable distributed components
########################################

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

########################################
# disable gateway
########################################

gateway:
  enabled: false

########################################
# disable monitoring extras
########################################

monitoring:

  dashboards:
    enabled: false

  rules:
    enabled: false

  serviceMonitor:
    enabled: false

  selfMonitoring:
    enabled: false

    grafanaAgent:
      installOperator: false

########################################
# disable extras
########################################

test:
  enabled: false

lokiCanary:
  enabled: false