# // environments/dev/infra/observability/loki-values.yaml
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  ########################################
  # core config
  ########################################
  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki # 🟢 THE MASTER SWITCH: Moves ALL internal storage out of /var/loki

  ########################################
  # storage & schema
  ########################################
  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb # 🟢 tsdb is the modern standard for Loki (replaces boltdb)
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

########################################
# single binary
########################################
singleBinary:
  replicas: 1
  persistence:
    enabled: false # Using /tmp via path_prefix makes this perfectly safe for local Dev

########################################
# disable distributed components
########################################
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

########################################
# disable gateway
########################################
gateway:
  enabled: false

########################################
# disable monitoring extras
########################################
monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

########################################
# disable extras
########################################
test:
  enabled: false
lokiCanary:
  enabled: false