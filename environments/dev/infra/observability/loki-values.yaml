# // environments/dev/infra/observability/loki-values.yaml
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  ########################################
  # core config
  ########################################
  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  ########################################
  # storage & schema
  ########################################
  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb 
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # --- 🟢 ADDED COMPACTOR OVERRIDE ---
  compactor:
    working_directory: /tmp/loki/boltdb-shipper-compactor
    shared_store: filesystem
  # -----------------------------------

########################################
# single binary
########################################
singleBinary:
  replicas: 1
  persistence:
    enabled: false 

########################################
# disable distributed components
########################################
read: { replicas: 0 }
write: { replicas: 0 }
backend: { replicas: 0 }

########################################
# disable gateway & extras
########################################
gateway:
  enabled: false

monitoring:
  dashboards: { enabled: false }
  rules: { enabled: false }
  serviceMonitor: { enabled: false }
  selfMonitoring:
    enabled: false
    grafanaAgent: { installOperator: false }

test: { enabled: false }
lokiCanary: { enabled: false }