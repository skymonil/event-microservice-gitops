# // environments/dev/infra/observability/tempo-values.yaml
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true

# Keep it lightweight for K3s
tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1000Mi