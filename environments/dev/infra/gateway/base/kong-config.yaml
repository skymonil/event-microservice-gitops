apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: kong
data:
  kong.yaml: |
    _format_version: "3.0"

    services:

    - name: user-service
      url: http://user-service.default.svc.cluster.local:3000
      routes:
      - name: user-route
        paths:
          - /api/users
        strip_path: false

    - name: order-service
      url: http://order-service.default.svc.cluster.local:3001
      routes:
      - name: order-route
        paths:
          - /api/orders
        strip_path: false

    - name: payment-service
      url: http://payment-service.default.svc.cluster.local:3002
      routes:
      - name: payment-route
        paths:
          - /api/payments
        strip_path: false

    - name: inventory-service
      url: http://inventory-service.default.svc.cluster.local:3003
      routes:
      - name: inventory-route
        paths:
          - /api/inventory
        strip_path: false