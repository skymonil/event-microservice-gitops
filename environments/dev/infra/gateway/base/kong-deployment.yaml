# // gateway/base/kong-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.7
          env:
            - name: KONG_DATABASE
              value: "off"

            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout

            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout

            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr

            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr

            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong-config.yaml

          ports:
            - containerPort: 8000
            - containerPort: 8443

          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative

      volumes:
        - name: kong-config
          configMap:
            name: kong-config