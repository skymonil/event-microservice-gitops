apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: database

  namespace: argocd

  annotations:

    argocd.argoproj.io/sync-wave: "1"

spec:

  project: default

  source:

    repoURL: https://github.com/skymonil/event-microservice-gitops

    path: platform/database

    targetRevision: main

    kustomize:

      enableHelm: true

  destination:

    server: https://kubernetes.default.svc

    namespace: database

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

      - CreateNamespace=true