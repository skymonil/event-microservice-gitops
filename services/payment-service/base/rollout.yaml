apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
      prometheus.io/scrape: "true"   # <--- Tells Alloy to scrape this pod
      prometheus.io/path: "/metrics" # <--- Where the metrics live
      prometheus.io/port: "3002"  # <--- Which port to scrape
    spec:
      containers:
      - name: payment-service
        image: skymonil/payment-service 
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: payment-service-config
        - secretRef:
            name: payment-service-secrets
        
        startupProbe:
          httpGet:
            path: /health/live
            port: 3002
          failureThreshold: 30 
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health/live
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 20

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  strategy:
    canary:
      canaryService: payment-service-canary
      stableService: payment-service-stable
  