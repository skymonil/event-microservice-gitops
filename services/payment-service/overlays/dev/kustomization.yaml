apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Point to the Base
resources:
- ../../base

# 2. Apply the Dev Strategy (Immediate Rollout)
patches:
- path: rollout-strategy.yaml

namePrefix: payment-service-

# 3. Set the Image Version
images:
- name: skymonil/payment-service
  # 🟢 CI/CD UPDATES THIS LINE
  newTag: latest