apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Point to the Base
resources:
- ../../base

# 2. Apply the Dev Strategy (Immediate Rollout)
patches:
- path: rollout-strategy.yaml

namePrefix: user-service-

# 3. Set the Image Version
images:
- name: skymonil/user-service
  newName: skymonil/user-service
  newTag: aee836664d87bde84f4f596a8909e472209f6007
