# services/common/migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration # Kustomize will prefix this with the service name
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0 # Fail fast so Argo stops the rollout immediately
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrator
        # The image will be overridden by Kustomize to match the app version
        image: service-image
        workingDir: /app 
        command: ["/bin/sh", "-c"]
        args: 
          - |
            echo "🚀 Starting database migration job..."
            
            echo "📊 Current Database Status:"
            /app/node_modules/.bin/dbmate -d /app/src/db/migrations status
            
            echo "⏳ Applying new migrations (if any)..."
            /app/node_modules/.bin/dbmate -d /app/src/db/migrations --no-dump-schema up
            
            echo "✅ Migration process finished!"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets # Kustomize will rename this per service
              key: DBMATE_DATABASE_URL