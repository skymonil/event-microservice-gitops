apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        prometheus.io/scrape: "true"   # <--- Tells Alloy to scrape this pod
        prometheus.io/path: "/metrics" # <--- Where the metrics live
        prometheus.io/port: "3003"  # <--- Which port to scrape
    spec:
      containers:
      - name: inventory-service
        # 🟢 CLEAN IMAGE NAME (No Tag)
        # Kustomize will find this string and replace the tag automatically
        image: skymonil/inventory-service 
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: inventory-service-config
        - secretRef:
            name: inventory-service-secrets
        
        startupProbe:
          httpGet:
            path: /health/live
            port: 3003
          failureThreshold: 30 # Gives the app 30 * 5s = 150s to start up
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health/live
            port: 3003
        initialDelaySeconds: 10
        periodSeconds: 20

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        # Add your other env vars/resources here
  strategy:
    canary:
      canaryService: inventory-service-canary
      stableService: inventory-service-stable
      # 🟢 NO STEPS DEFINED
      # We leave this empty in Base so overlays can define their own behavior