apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- rollout.yaml
- service.yaml
- secrets.yaml
- ConfigMap.yaml
- ../../common

namePrefix: order-service-

images:
  - name: service-image
    newName: skymonil/order-service
    newTag: latest

# 🟢 PATCH: Tell the common migration job to use the local secret
patches:
- target:
    kind: Job
    name: db-migration
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
      value: secrets