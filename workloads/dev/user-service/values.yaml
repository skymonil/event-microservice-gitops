# workloads/dev/user-service/values.yaml
microservice:
  image:
    repository: skymonil/user-service
    tag: "0920dcf8ed47077da949345e96713ba31b8e2a62"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  config:
    NODE_ENV: "development"
    PORT: "3000"
    JWT_EXPIRES_IN: "1h"
    LOG_LEVEL: "debug"
    KAFKA_BROKERS: "dev-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  podSecurity:
    automountServiceAccountToken: false
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
  analysis:
    enabled: true
    testCmd: "test:user"
  strategy:
    maxSurge: "100%"
    maxUnavailable: 0
    # 🟢 Fixed Logic: Route 20% -> Test for 1m -> Promote to 100%
    steps:
      - setWeight: 100
  seeding:
    enabled: true
    image:
      repository: skymonil/user-service
      tag: "705fb5e9f7456a4c2587edf6363628b2c1988f78"
      command:
        - pnpm
        - run
        - migrate
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  probes:
    readiness:
      httpGet:
        path: /readyz
        port: 3000
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    liveness:
      httpGet:
        path: /healthz
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 3
