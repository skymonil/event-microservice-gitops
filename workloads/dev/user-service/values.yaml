microservice:

  image:
    repository: skymonil/user-service
    tag: latest

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  config:
    NODE_ENV: "development"
    PORT: "3000"
    JWT_EXPIRES_IN: "1h"
    LOG_LEVEL: "debug"
    KAFKA_BROKERS: "dev-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  seeding:
    enabled: false
    image:
      repository: skymonil/user-service
      tag: latest
    command:
      - pnpm
      - run
      - migrate

  strategy:
    canary:
      steps:
        - setWeight: 100
        - pause:
            duration: 15s

  analysis:
    enabled: true
    testCmd: test:user

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi