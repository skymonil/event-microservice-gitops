# workloads/dev/order-service/values.yaml
microservice:
  image:
    repository: skymonil/order-service
    tag: d2f85af9bb6b3436fa97749f4c3609388e831b62
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3001

  config:
    NODE_ENV: development
    PORT: "3001"
    KAFKA_BROKERS: "dev-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
    LOG_LEVEL: "debug"
    JWT_EXPIRES_IN: "1h"

  podSecurity:
    automountServiceAccountToken: false
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  analysis: 
    enabled: true
    testCmd: "test:order"

  strategy:
    maxSurge: "25%"
    maxUnavailable: 0
    # 🟢 Fixed Logic: Route 20% -> Test for 1m -> Promote to 100%
    steps:
      - setWeight: 20
      - pause:
          duration: 1m
      - setWeight: 100