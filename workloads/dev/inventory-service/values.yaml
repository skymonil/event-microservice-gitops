# workloads/dev/inventory-service/values.yaml

microservice:
  # 1. Image & Tag
  image:
    repository: skymonil/inventory-service
    tag: "d2f85af9bb6b3436fa97749f4c3609388e831b62"

  # 2. Scaling
  replicaCount: 1

  # 3. Service Configuration
  service:
    type: ClusterIP
    port: 3003

  # 4. Environment Variables
  config:
    NODE_ENV: "development"
    PORT: "3003"
    JWT_EXPIRES_IN: "1h"
    LOG_LEVEL: "debug"
    KAFKA_BROKERS: "dev-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  # 5. Database Migration
  seeding:
    enabled: false
    image:
      repository: skymonil/inventory-service
      tag: "d2f85af9bb6b3436fa97749f4c3609388e831b62"
    command:
      - pnpm
      - run
      - db:migrate

  # 6. Progressive Delivery
  strategy:
    canary:
      steps:
        - setWeight: 100
        - pause:
            duration: 15s

  # 7. Analysis Testing
  analysis:
    enabled: true
    testCmd: "test:order"

  # 8. Compute Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  probes:
    startup:
      httpGet:
        path: /health/live
        port: 3003
      failureThreshold: 30
      periodSeconds: 5

    readiness:
      httpGet:
        path: /health/ready
        port: 3003
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

    liveness:
      httpGet:
        path: /health/live
        port: 3003
      initialDelaySeconds: 10
      periodSeconds: 20
      failureThreshold: 3