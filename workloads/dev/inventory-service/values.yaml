# workloads/dev/inventory-service/values.yaml

# 1. Image & Tag (Migrated from overlays/dev/kustomization.yaml)
image:
  repository: skymonil/inventory-service
  tag: latest

# 2. Scaling (Migrated from base/rollout.yaml)
replicaCount: 1

# 3. Service Configuration (Migrated from base/service.yaml)
service:
  # 🟢 OPTIMIZATION: Changed from LoadBalancer to ClusterIP. 
  # Since Kong is now your Gateway and LoadBalancer, individual services 
  # should only be exposed internally to prevent consuming excess IPs.
  type: ClusterIP
  port: 3001

# 4. Environment Variables (Migrated from base/ConfigMap.yaml)
config:
  NODE_ENV: "development"
  PORT: "3001"
  JWT_EXPIRES_IN: "1h"
  LOG_LEVEL: "debug"
  # 🟢 OPTIMIZATION: Updated to use the fully qualified cluster DNS
  KAFKA_BROKERS: "dev-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

# 5. Database Migration (Migrated from base/kustomization.yaml patches)
seeding:
  enabled: false
  image:
    repository: skymonil/order-service
    tag: "d2f85af9bb6b3436fa97749f4c3609388e831b62"
  command: ["pnpm", "run", "db:migrate"]

# 6. Progressive Delivery (Migrated from overlays/dev/rollout-strategy.yaml)
strategy:
  canary:
    steps:
      - setWeight: 100
      - pause: {duration: 15s}

# 7. Analysis Testing (Migrated from overlays/dev/rollout-strategy.yaml)
analysis:
  enabled: true
  testCmd: "test:order"

# 8. Compute Resources (Migrated from base/rollout.yaml)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  startup:
    httpGet:
      path: /health/live
      port: 3001
    failureThreshold: 30
    periodSeconds: 5
  readiness:
    httpGet:
      path: /health/ready
      port: 3001
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    httpGet:
      path: /health/live
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 20