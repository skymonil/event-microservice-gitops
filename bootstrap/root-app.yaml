apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: dev-root
  namespace: argocd
  directory:
    recurse: true

spec:

  project: default

  source:
    repoURL: https://github.com/skymonil/event-microservice-gitops
    targetRevision: main
    path: environments/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true