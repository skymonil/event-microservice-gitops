# platform/kafka/topics/order-events.yaml
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: payment.failed
  labels:
    strimzi.io/cluster: dev-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 86400000
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: payment.refunded
  labels:
    strimzi.io/cluster: dev-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 86400000
    cleanup.policy: delete
  
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: payment.completed
  labels:
    strimzi.io/cluster: dev-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 86400000
    cleanup.policy: delete