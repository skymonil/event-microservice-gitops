# platform/state/kafka/cluster/kafka-cluster.yaml

# 1. Define the KRaft Nodes (Brokers + Controllers)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  labels:
    # 🟢 This links the nodes to the cluster defined below
    strimzi.io/cluster: dev-cluster
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 5Gi
        deleteClaim: true

---
# 2. Define the Cluster Configuration
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: dev-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 3.7.0
    metadataVersion: 3.7-IV4
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
  entityOperator:
    # 🟢 This enables the Topic Operator to process your order/inventory topics
    topicOperator: {}
    userOperator: {}