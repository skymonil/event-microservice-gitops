# platform/state/kafka/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kafka

helmCharts:
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts/
    version: 0.41.0
    releaseName: strimzi-operator
    namespace: kafka
    valuesFile: operator-values.yaml

resources:
  - kafka-cluster.yaml
  - kafka-connect.yaml                   # 🟢 Added to the build
  - connectors
  - topics