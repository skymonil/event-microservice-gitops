{{- if or .Values.auth.acl.enabled (and .Values.auth.acl.sentinel .Values.auth.acl.users) }}
{{- $userSecret := .Values.auth.acl.userSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-acl" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if .Values.auth.acl.enabled }}
  users.acl: |-
    {{- $password := include "redis.password" . }}
    user default on {{ if $password }}>{{ $password }}{{ else }}nopass{{ end }} ~* &* +@all
    {{- range .Values.auth.acl.users }}
    {{- $userPassword := .password | default "" }}
    {{- if $userSecret }}
    {{- $secretPassword := include "common.secrets.get" (dict "secret" $userSecret "key" .username "context" $) }}
    user {{ .username }} {{ default "on" .enabled }} {{ if $secretPassword }}>{{ $secretPassword }}{{ else }}nopass{{ end }} {{ default "~*" .keys }} {{ default "&*" .channels }} {{ default "+@all" .commands }}
    {{- else }}
    user {{ .username }} {{ default "on" .enabled }} {{ if $userPassword }}>{{ $userPassword }}{{ else }}nopass{{ end }} {{ default "~*" .keys }} {{ default "&*" .channels }} {{ default "+@all" .commands }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- if and .Values.auth.acl.sentinel .Values.auth.acl.users }}
  {{- $firstUser := first .Values.auth.acl.users }}
  {{- $firstPassword := "" }}
  {{- if $userSecret }}
    {{- $firstPassword = include "common.secrets.get" (dict "secret" $userSecret "key" $firstUser.username "context" $) | default "" }}
  {{- else }}
    {{- $firstPassword = $firstUser.password | default "" }}
  {{- end }}
  sentinel-users.acl: |-
    {{- range .Values.auth.acl.users }}
    {{- $userPassword := .password | default "" }}
    {{- if $userSecret }}
    {{- $secretPassword := include "common.secrets.get" (dict "secret" $userSecret "key" .username "context" $) | default "" }}
    {{- if $secretPassword }}
    user {{ .username }} {{ default "on" .enabled }} >{{ $secretPassword }} {{ default "~*" .keys }} {{ default "&*" .channels }} {{ default "+@all" .commands }}
    {{- end }}
    {{- else if $userPassword }}
    user {{ .username }} {{ default "on" .enabled }} >{{ $userPassword }} {{ default "~*" .keys }} {{ default "&*" .channels }} {{ default "+@all" .commands }}
    {{- end }}
    {{- end }}
  sentinel-sentinel-user: {{ $firstUser.username | quote }}
  sentinel-sentinel-pass: {{ $firstPassword | quote }}
  {{- end }}
{{- end }}
