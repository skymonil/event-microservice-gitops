## // platform/gateway/base/values.yaml
image:
  repository: kong
  tag: "3.7"

env:
  database: "off"
  # Kong Helm chart handles standard logging by default, but you can explicitly set it:
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr

# Disable the Ingress Controller since you are using Kong purely as an API Gateway
ingressController:
  enabled: false

# Your declarative DB-less configuration
dblessConfig:
  config: |
    _format_version: "3.0"
    services:
      - name: user-service
        url: http://dev-user-service-stable.user-service.svc.cluster.local:80
        routes:
          - name: user-route
            paths: [ "/api/users" ]
            strip_path: false
      - name: order-service
        url: http://order-service-stable.order-service.svc.cluster.local:80
        routes:
          - name: order-route
            paths: [ "/api/orders" ]
            strip_path: false
      - name: payment-service
        url: http://payment-service-stable.payment-service.svc.cluster.local:80
        routes:
          - name: payment-route
            paths: [ "/api/payments" ]
            strip_path: false
      - name: inventory-service
        url: http://inventory-service-stable.inventory-service.svc.cluster.local:80
        routes:
          - name: inventory-route
            paths: [ "/api/inventory" ]
            strip_path: false