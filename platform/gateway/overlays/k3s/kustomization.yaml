apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmGlobals:
  chartHome: /tmp/kustomize-helm-charts

resources:
  - ../../base

helmCharts:
  - name: kong
    repo: https://charts.konghq.com
    version: 2.38.0
    releaseName: kong
    namespace: kong
    valuesFile: values-k3s.yaml