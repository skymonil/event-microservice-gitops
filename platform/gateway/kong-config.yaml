apiVersion: v1
kind: ConfigMap

metadata:
  name: kong-dbless-config
  namespace: gateway

data:

  kong.yml: |
    _format_version: "3.0"

    services:

      - name: user-service
        url: http://dev-user-service.user-service.svc.cluster.local:3000

        routes:
          - name: user-route
            paths:
              - /api/users

      - name: order-service
        url: http://dev-order-service.order-service.svc.cluster.local:3000

        routes:
          - name: order-route
            paths:
              - /api/orders

      - name: inventory-service
        url: http://dev-inventory-service.inventory-service.svc.cluster.local:3003

        routes:
          - name: inventory-route
            paths:
              - /api/inventory

      - name: payment-service
        url: http://dev-payment-service.payment-service.svc.cluster.local:3000

        routes:
          - name: payment-route
            paths:
              - /api/payments