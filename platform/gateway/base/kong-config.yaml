_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service.default.svc.cluster.local:80
    routes:
      - name: user-route
        paths:
          - /api/users
        strip_path: false

  - name: order-service
    url: http://order-service.default.svc.cluster.local:80
    routes:
      - name: order-route
        paths:
          - /api/orders
        strip_path: true

  - name: payment-service
    url: http://payment-service.default.svc.cluster.local:80
    routes:
      - name: payment-route
        paths:
          - /api/payments
        strip_path: true

  - name: inventory-service
    url: http://inventory-service.default.svc.cluster.local:80
    routes:
      - name: inventory-route
        paths:
          - /api/inventory
        strip_path: true