apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kong

helmCharts:
  - name: kong
    repo: https://charts.konghq.com
    version: 2.38.0 # Use the latest stable chart version
    releaseName: kong
    namespace: kong
    valuesFile: values.yaml

patches:
  - target:
      kind: ServiceAccount
      name: kong-kong
      namespace: kong
    patch: |-
      # 🟢 Tells Kustomize to natively merge the configurations instead of treating duplicates as an error
      $patch: replace
      metadata:
        name: kong-kong