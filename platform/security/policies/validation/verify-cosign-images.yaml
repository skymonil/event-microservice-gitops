apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: verify-images

spec:

  validationFailureAction: Enforce

  background: false

  rules:

  - name: verify-signatures

    match:

      any:

      - resources:

          kinds:
          - Pod

    verifyImages:

    - imageReferences:

      - "docker.io/skymonil/*"

      mutateDigest: true

      attestors:

      - count: 1

        entries:

        - keyless:

            issuer: https://token.actions.githubusercontent.com

            subject: https://github.com/skymonil/Event-Based-Microservice-App/.github/workflows/*

            rekor:

              url: https://rekor.sigstore.dev