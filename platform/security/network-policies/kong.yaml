apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong
  namespace: kong
spec:
  podSelector: {}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - {}

  egress:
    # Allow all traffic within the cluster
    - to:
        - namespaceSelector: {}

    # Allow access to the Kubernetes API Service
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443

    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53