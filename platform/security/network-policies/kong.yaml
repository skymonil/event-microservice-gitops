apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: kong
  namespace: kong

spec:
  podSelector: {}

  policyTypes:
  - Ingress
  - Egress

  ingress:
  - {}

  egress:

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: user-service

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: order-service

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: inventory-service

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: payment-service

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system

    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP