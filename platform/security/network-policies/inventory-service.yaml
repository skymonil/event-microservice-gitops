apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: inventory-service
  namespace: inventory-service

spec:
  podSelector: {}

  policyTypes:
  - Ingress
  - Egress

  ingress:

  - from:

    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kong

    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: order-service

  egress:

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres
    ports:
    - port: 5432

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redis
    ports:
    - port: 6379

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka
    ports:
    - port: 9092

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP