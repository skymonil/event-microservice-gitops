# // platform/observability/alloy-values.yaml
alloy:
  extraEnv:
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName # This maps the Physical Node Name to the HOSTNAME env var
  configMap:
    content: |
      // ==========================================
      // 1. OTLP RECEIVER (Listens to Node.js apps)
      // ==========================================
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          // 🟢 FIX: Removed quotes for component references
          metrics = [otelcol.exporter.prometheus.to_prometheus.input]
          logs    = [otelcol.exporter.loki.to_loki.input]
          traces  = [otelcol.processor.tail_sampling.hybrid.input]
        }
      }
      
      
      // ==========================================
      // 2. HYBRID TAIL SAMPLER (The Brains)
      // ==========================================
      otelcol.processor.tail_sampling "hybrid" {
        // How long to wait for the trace to finish before evaluating
        decision_wait = "10s" 

        // 🟢 Policy 1: Keep 100% of traces that contain an error
        policy {
          name = "keep-errors"
          type = "status_code"
          status_code {
            status_codes = ["ERROR"]
          }
        }

        // 🟢 Policy 2: Keep 100% of slow traces (e.g., > 1.5 seconds)
        policy {
          name = "keep-slow"
          type = "latency"
          latency {
            threshold_ms = 1500
          }
        }

        // 🟢 Policy 3: Keep a 5% random baseline of all other traffic
        policy {
          name = "baseline-success"
          type = "probabilistic"
          probabilistic {
            sampling_percentage = 5.0
          }
        }
        // 🎯 FIX: Forward the sampled traces to your Tempo exporter
        output {
          traces = [otelcol.exporter.otlp.to_tempo.input]
        }
      } //

      // ==========================================
      // 2. EXPORTERS (Converts OTLP to native formats)
      // ==========================================
      otelcol.exporter.prometheus "to_prometheus" {
        forward_to = [prometheus.remote_write.local.receiver]
      }

      otelcol.exporter.loki "to_loki" {
        forward_to = [loki.write.local.receiver]
      }

      otelcol.exporter.otlp "to_tempo" {
        client {
          // Pointing to your Tempo instance in the local cluster
          endpoint = "tempo.observability.svc.cluster.local:4317"
          tls {
            insecure             = true
            insecure_skip_verify = true
          }
        }
      }

      // ==========================================
      // 3. BACKEND ENDPOINTS
      // ==========================================
      prometheus.remote_write "local" {
        endpoint {
          url = "http://prometheus-server.observability.svc.cluster.local:80/api/v1/write"
        }
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // ==========================================
      // 4. KUBERNETES LOG SCRAPING (Promtail Replacement)
      // ==========================================
      
      // A. Discover all pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // B. Filter the pods
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        
        // ONLY scrape pods that are on the same physical node as this specific Alloy agent
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          action        = "keep"
          regex         = env("HOSTNAME")
        }
        
        // Map the ugly Kubernetes labels to clean Loki labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
      }

      // ==========================================
      // 4. C. Read and PROCESS the logs
      // ==========================================

      // 1. New Process Stage to handle JSON and Multi-line
      loki.process "kubernetes_logs" {
        forward_to = [loki.write.local.receiver]
        // Unpack the JSON so 'level', 'msg', and 'stack' become internal labels
        stage.json {
          expressions = {
            level = "level",
            msg   = "msg",
            stack = "stack",
          }
        }
      }

      // C. Read the actual log files and push to Loki
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.kubernetes_logs.receiver]
      }

     

      // ==========================================
      // 5. INFRASTRUCTURE METRICS (Scraping)
      // ==========================================
      
      // Discover the Node Exporter and Kube-State-Metrics services
      discovery.kubernetes "infra" {
        role = "service"
      }

      // Filter to only scrape those specific exporters
      discovery.relabel "infra_metrics" {
        targets = discovery.kubernetes.infra.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex         = "(prometheus-node-exporter|prometheus-kube-state-metrics)"
          action        = "keep"
        }
      }

      // Scrape the metrics and send them to Prometheus
      prometheus.scrape "infra" {
        targets    = discovery.relabel.infra_metrics.output
        forward_to = [prometheus.remote_write.local.receiver]
      }

      // ==========================================
      // 6. BUILT-IN NODE EXPORTER (Bypassing K3s/WSL2 bugs)
      // ==========================================
      
      // A. Turn on the internal node-exporter engine
      prometheus.exporter.unix "local_machine" {
        // Alloy will automatically read whatever CPU/RAM it has access to
      }

      // B. Scrape itself and push to your central Prometheus
      prometheus.scrape "alloy_node_metrics" {
        targets    = prometheus.exporter.unix.local_machine.targets
        forward_to = [prometheus.remote_write.local.receiver]
      }

      // ==========================================
      // 7. APPLICATION SCRAPING (prom-client)
      // ==========================================
      
      // Find all pods in the cluster
      discovery.kubernetes "app_pods" {
        role = "pod"
      }

      // Filter to only scrape pods that have the "prometheus.io/scrape: true" annotation
      discovery.relabel "app_metrics" {
        targets = discovery.kubernetes.app_pods.targets
        
        // 1. Keep only scraped pods
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        
        // 2. Map the 'app' label to 'service' so your Grafana Dashboards work
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "service"
        }
      }

      // Scrape them and send to Prometheus
      prometheus.scrape "app_metrics" {
        targets    = discovery.relabel.app_metrics.output
        forward_to = [prometheus.remote_write.local.receiver]
      }
     
# Expose the OTLP ports so your Node.js apps can reach Alloy
controller:
  type: daemonset

service:
  type: ClusterIP
  additionalPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318