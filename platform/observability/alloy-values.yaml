# // platform/observability/alloy-values.yaml
alloy:
  extraEnv:
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName # This maps the Physical Node Name to the HOSTNAME env var
  configMap:
    content: |
      // ==========================================
      // 1. OTLP RECEIVER (Listens to Node.js apps)
      // ==========================================
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          // 🟢 FIX: Removed quotes for component references
          metrics = [otelcol.exporter.prometheus.to_prometheus.input]
          logs    = [otelcol.exporter.loki.to_loki.input]
          traces  = [otelcol.exporter.otlp.to_tempo.input]
        }
      }

      // ==========================================
      // 2. EXPORTERS (Converts OTLP to native formats)
      // ==========================================
      otelcol.exporter.prometheus "to_prometheus" {
        forward_to = [prometheus.remote_write.local.receiver]
      }

      otelcol.exporter.loki "to_loki" {
        forward_to = [loki.write.local.receiver]
      }

      otelcol.exporter.otlp "to_tempo" {
        client {
          // Pointing to your Tempo instance in the local cluster
          endpoint = "tempo.observability.svc.cluster.local:4317"
          tls {
            insecure             = true
            insecure_skip_verify = true
          }
        }
      }

      // ==========================================
      // 3. BACKEND ENDPOINTS
      // ==========================================
      prometheus.remote_write "local" {
        endpoint {
          url = "http://prometheus.observability.svc.cluster.local:9090/api/v1/write"
        }
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // ==========================================
      // 4. KUBERNETES LOG SCRAPING (Promtail Replacement)
      // ==========================================
      
      // A. Discover all pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // B. Filter the pods
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        
        // ONLY scrape pods that are on the same physical node as this specific Alloy agent
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          action        = "keep"
          regex         = env("HOSTNAME")
        }
        
        // Map the ugly Kubernetes labels to clean Loki labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
      }

      // C. Read the actual log files and push to Loki
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.local.receiver]
      }

# Expose the OTLP ports so your Node.js apps can reach Alloy
controller:
  type: daemonset

service:
  type: ClusterIP
  additionalPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318