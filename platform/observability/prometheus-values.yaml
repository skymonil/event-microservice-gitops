# // platform/observability/prometheus-values.yaml

server:
  extraArgs:
    web.enable-remote-write-receiver: ""
    web.enable-lifecycle: ""
  
  persistentVolume:
    enabled: true
    storageClass: "local-path"
    size: 2Gi

serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

# 🟢 FIX: Ensure these match the chart's top-level keys
# Most Prometheus community charts use these names:
alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  enabled: false

# Extra safety for the ones you tried
nodeExporter:
  enabled: false
pushgateway:
  enabled: false
kubeStateMetrics:
  enabled: false

serviceAccounts:
  server:
    create: true