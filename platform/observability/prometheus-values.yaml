# // platform/observability/prometheus-values.yaml

server:
  # 🟢 FIX: Use the native global block instead of serverFiles
  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver

  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 2Gi

############################################
# disable heavy components
############################################

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: true
  
  # 1. Tell the chart not to generate the default root mount
  hostRootfs: false 

  # 2. Only ask for CPU, Memory, and Network stats
  extraArgs:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    # Notice we completely deleted --path.rootfs

  # 3. Only mount the allowed folders. NO hostPath: /
  extraHostVolumeMounts:
    - name: proc
      hostPath: /proc
      mountPath: /host/proc
      readOnly: true
    - name: sys
      hostPath: /sys
      mountPath: /host/sys
      readOnly: true
kube-state-metrics:
  enabled: true

############################################
# disable servicemonitors
############################################

serviceMonitor:
  enabled: false

############################################
# service account
############################################

serviceAccounts:
  server:
    create: true