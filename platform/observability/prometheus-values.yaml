# platform/observability/prometheus-values.yaml

server:

  extraArgs:
    web.enable-remote-write-receiver: ""

  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 2Gi

############################################
# KEEP DEFAULT SCRAPE CONFIG
############################################

serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s

    scrape_configs:

      # Prometheus self-metrics
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

############################################
# Disable heavy components for homelab
############################################

alertmanager:
  enabled: false

pushgateway:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false

############################################
# keep service account
############################################

serviceAccounts:
  server:
    create: true