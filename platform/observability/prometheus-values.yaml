# // platform/observability/prometheus-values.yaml

server:
  # 🟢 FIX: Use the native global block instead of serverFiles
  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver

  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 2Gi

############################################
# disable heavy components
############################################

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: true

kube-state-metrics:
  enabled: true

############################################
# disable servicemonitors
############################################

serviceMonitor:
  enabled: false

############################################
# service account
############################################

serviceAccounts:
  server:
    create: true