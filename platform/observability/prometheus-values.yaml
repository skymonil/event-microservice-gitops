# // platform/observability/prometheus-values.yaml

server:
  # 🟢 FIX: Switch to extraFlags (which natively accepts an array of booleans)
  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver

  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 2Gi

############################################
# KEEP DEFAULT CONFIG + ADD MINIMAL SCRAPE
############################################

serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

############################################
# disable heavy components
############################################

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  enabled: false

############################################
# disable servicemonitors
############################################

serviceMonitor:
  enabled: false

############################################

serviceAccounts:
  server:
    create: true