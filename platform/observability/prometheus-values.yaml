# // platform/observability/prometheus-values.yaml

server:
  # 🟢 FIX: Use the native global block instead of serverFiles
  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver

  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 2Gi

############################################
# disable heavy components
############################################

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: true
  hostRootfs: false 
  extraArgs:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/host/root
  sidecarHostVolumeMounts: []
  
  # This is the critical part for the mount error:
  extraHostVolumeMounts:
    - name: proc
      hostPath: /proc
      mountPath: /host/proc
      readOnly: true
    - name: sys
      hostPath: /sys
      mountPath: /host/sys
      readOnly: true
    # We mount / as a standard volume WITHOUT propagation 
    # This avoids the "not a shared or slave mount" error
    - name: root
      hostPath: /
      mountPath: /host/root
      readOnly: true # <--- THIS IS THE MAGIC LINE

kube-state-metrics:
  enabled: true

############################################
# disable servicemonitors
############################################

serviceMonitor:
  enabled: false

############################################
# service account
############################################

serviceAccounts:
  server:
    create: true