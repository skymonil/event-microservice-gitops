# platform/observability/loki-values.yaml

deploymentMode: SingleBinary

loki:

  auth_enabled: false

  ########################################
  # writable base directory
  ########################################

  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  ########################################
  # storage
  ########################################

  storage:
    type: filesystem

  storage_config:

    filesystem:
      directory: /tmp/loki/chunks

    tsdb_shipper:
      active_index_directory: /tmp/loki/index
      cache_location: /tmp/loki/index_cache

  ########################################
  # schema (required for tsdb)
  ########################################

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13

        index:
          prefix: loki_index_
          period: 24h

  ########################################
  # disable ruler completely
  ########################################

  ruler:
    enabled: false

  ########################################
  # compactor must use writable path
  ########################################

  compactor:
    working_directory: /tmp/loki/compactor
    shared_store: filesystem

  ########################################
  # server port
  ########################################

  server:
    http_listen_port: 3100

########################################
# single binary
########################################

singleBinary:

  replicas: 1

  persistence:
    enabled: false

########################################
# disable distributed mode components
########################################

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

########################################
# disable extras for homelab
########################################

gateway:
  enabled: false

monitoring:

  dashboards:
    enabled: false

  rules:
    enabled: false

  serviceMonitor:
    enabled: false

  selfMonitoring:
    enabled: false

    grafanaAgent:
      installOperator: false

  lokiCanary:
    enabled: false

test:
  enabled: false