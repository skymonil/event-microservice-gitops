# // platform/observability/grafana-values.yaml

adminPassword: "admin"

# Ensure persistence is enabled so you don't lose dashboards on restart
persistence:
  enabled: true
  storageClassName: "local-path"
  size: 2Gi

# 🟢 PRE-WIRE THE DATASOURCES
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server:80
        access: proxy
        isDefault: true
      
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
      
      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy
        # This allows Tempo to link directly to Loki logs!
        jsonData:
          tracesToLogsV2:
            datasourceUid: 'loki'
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: false
            filterBySpanID: false

# Disable extra heavy components not needed right now
sidecar:
  dashboards:
    enabled: false